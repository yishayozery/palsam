name: 💾 גיבוי יומי DB

on:
  schedule:
    # פעמיים ביום: 09:00 ו-21:00 UTC = 12:00 ו-00:00 בישראל (קיץ; בחורף זז שעה)
    - cron: '0 9,21 * * *'
  workflow_dispatch: # מאפשר הרצה ידנית

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: התקנת PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: ייצוא ה-DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%d_%H-%M-%S")
          FILENAME="palsam-backup-${TIMESTAMP}.sql.gz"
          echo "FILENAME=${FILENAME}" >> $GITHUB_ENV
          pg_dump "${DATABASE_URL}" --no-owner --no-acl --format=plain | gzip > "${FILENAME}"
          ls -lh "${FILENAME}"

      - name: שמירה כ-artifact ל-90 ימים
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.FILENAME }}
          path: ${{ env.FILENAME }}
          retention-days: 90
          if-no-files-found: error

      # אופציונלי: העלאה ל-S3 (אם הוגדרו secrets של AWS)
      - name: בדיקה אם S3 מוגדר
        id: check_s3
        env:
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -n "$AWS_KEY" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: 'אופציונלי: העלאה ל-S3'
        if: steps.check_s3.outputs.enabled == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'eu-central-1' }}
          S3_BUCKET: ${{ secrets.S3_BACKUP_BUCKET }}
        run: |
          aws s3 cp "${FILENAME}" "s3://${S3_BUCKET}/palsam-backups/${FILENAME}"
          echo "✓ הועלה ל-S3"

      # עדכון מסך הגיבויים באפליקציה (BackupRun) — רק אם הוגדר CRON_SECRET (אותו ערך כמו ב-Vercel)
      - name: בדיקה אם CRON_SECRET מוגדר
        id: check_cron
        env:
          CS: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$CS" ]; then echo "enabled=true" >> $GITHUB_OUTPUT; else echo "enabled=false" >> $GITHUB_OUTPUT; fi

      - name: 'עדכון דשבורד הגיבויים ב-/backups'
        if: steps.check_cron.outputs.enabled == 'true'
        env:
          CS: ${{ secrets.CRON_SECRET }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -X GET "https://www.palmy.co.il/api/cron/backup" -H "Authorization: Bearer $CS")
          echo "dashboard ping → HTTP $code"
          test "$code" = "200"
